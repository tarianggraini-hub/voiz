<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Voiz</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <a href="index.html" class="navbar-brand">
        🎤
        <span>Voiz</span>
      </a>
      <span style="font-size: 0.82rem; color: var(--text-sub)">Admin Panel</span>
      <div class="navbar-right">
        <span id="adminName" style="font-size: 0.84rem; color: var(--text-sub)"></span>
        <div id="navRight"></div>
      </div>
    </nav>

    <div class="admin-layout">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <div class="sb-label">Menu</div>
        <button class="sb-item active" onclick="showView('overview', this)">📊 Overview</button>
        <button class="sb-item" onclick="showView('aspirasi', this)">📋 Kelola Aspirasi</button>
        <button class="sb-item" onclick="showView('notifikasi', this)">🔔 Notifikasi</button>

        <div class="sb-label" style="margin-top: 1rem">Filter Cepat</div>
        <button class="sb-item" onclick="filterView('menunggu')">⏳ Menunggu</button>
        <button class="sb-item" onclick="filterView('diproses')">⚙️ Diproses</button>
        <button class="sb-item" onclick="filterView('selesai')">✅ Selesai</button>
      </aside>

      <!-- Content -->
      <main class="admin-content">
        <!-- ── Overview ── -->
        <div class="view active" id="view-overview">
          <h2 style="margin-bottom: 1.5rem">Overview</h2>
          <div class="stats-grid" id="statsGrid">
            <div class="stat-card flex-center" style="height: 100px">
              <div class="spinner"></div>
            </div>
          </div>
          <div class="charts-row">
            <div class="chart-card">
              <div class="chart-title">📈 Tren Aspirasi (6 Bulan)</div>
              <canvas id="trendChart" height="200"></canvas>
            </div>
            <div class="chart-card">
              <div class="chart-title">🗂️ Distribusi Kategori</div>
              <canvas id="katChart" height="200"></canvas>
            </div>
          </div>
          <div class="chart-card">
            <div class="chart-title">🏆 Top 5 Aspirasi (by Vote)</div>
            <div id="topVoteList" style="margin-top: 0.25rem"></div>
          </div>
        </div>

        <!-- ── Kelola Aspirasi ── -->
        <div class="view" id="view-aspirasi">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              margin-bottom: 1.4rem;
              flex-wrap: wrap;
              gap: 1rem;
            "
          >
            <h2>Kelola Aspirasi</h2>
            <select
              id="adminStatusFilter"
              class="form-control"
              style="width: 160px"
              onchange="loadAdminAspirasi()"
            >
              <option value="">Semua Status</option>
              <option value="menunggu">Menunggu</option>
              <option value="diterima">Diterima</option>
              <option value="diproses">Diproses</option>
              <option value="selesai">Selesai</option>
              <option value="ditolak">Ditolak</option>
            </select>
          </div>
          <div
            style="
              background: var(--bg-card);
              border: 1px solid var(--border);
              border-radius: var(--radius);
              overflow: hidden;
            "
          >
            <table class="tbl">
              <thead>
                <tr>
                  <th>Aspirasi</th>
                  <th>Kategori</th>
                  <th>Pengirim</th>
                  <th>Vote</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="adminTbody">
                <tr>
                  <td colspan="6" class="text-center text-sub" style="padding: 2rem">Memuat…</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="adminPagination" class="pagination"></div>
        </div>

        <!-- ── Notifikasi ── -->
        <div class="view" id="view-notifikasi">
          <h2 style="margin-bottom: 1.4rem">Notifikasi</h2>
          <div id="adminNotifList"></div>
        </div>
      </main>
    </div>

    <!-- Modal Update Status -->
    <div
      id="statusModal"
      class="modal-bg"
      style="display: none"
      onclick="if (event.target === this) this.style.display = 'none';"
    >
      <div class="modal-box" style="max-width: 440px">
        <button
          class="modal-close"
          onclick="document.getElementById('statusModal').style.display = 'none'"
        >
          ✕
        </button>
        <h3 style="margin-bottom: 1.1rem">Update Status</h3>
        <div id="statusModalContent"></div>
      </div>
    </div>

    <div id="toast-wrap"></div>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
